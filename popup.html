<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      color: #333;
    }

    h3 {
      margin: 0 0 20px 0;
      color: #2196F3;
      font-size: 18px;
      font-weight: 500;
      text-align: center;
    }

    .input-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #666;
      font-size: 13px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #2196F3;
      box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.1);
    }

    input::placeholder {
      color: #999;
    }

    .button-group {
      margin-top: 20px;
      display: flex;
      gap: 12px;
    }

    button {
      flex: 1;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #saveSettings {
      background-color: #2196F3;
      color: white;
    }

    #saveSettings:hover {
      background-color: #1976D2;
    }

    #clearHistory {
      background-color: #f5f5f5;
      color: #666;
    }

    #clearHistory:hover {
      background-color: #e0e0e0;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(33, 33, 33, 0.9);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      display: none;
      max-width: 280px;
      word-wrap: break-word;
      text-align: center;
      font-size: 14px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .toast.show {
      display: block;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translate(-50%, 10px);
      }
      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    .analyze-button {
      display: block;
      width: 100%;
      margin: 20px 0;
      padding: 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .analyze-button:hover {
      background-color: #45a049;
      transform: translateY(-1px);
    }

    .analyze-button:active {
      transform: translateY(1px);
    }

    .shortcut-tip, .shortcut-key {
      display: none;
    }
  </style>
</head>
<body>
  <h3>地理探索助手</h3>
  <div class="input-group">
    <label>API 域名</label>
    <input type="text" id="apiUrl" placeholder="例如: https://api.openai.com">
  </div>
  <div class="input-group">
    <label>API Key</label>
    <input type="text" id="apiKey" placeholder="输入你的API密钥">
  </div>
  <div class="input-group">
    <label>模型</label>
    <input type="text" id="model" placeholder="例如: gpt-4-vision-preview">
  </div>
  <button class="analyze-button" id="analyzeButton">
    开始分析位置
  </button>
  <div class="button-group">
    <button id="saveSettings">保存设置</button>
  </div>
  <div id="toast" class="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
